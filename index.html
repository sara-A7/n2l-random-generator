<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N2L Gerador Aleatório para ReAL e CAP</title>
    <style>
        .random-number-display {
            background-color: lightgrey;
            padding: 20px;
            font-size: 2em;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>N2L Gerador Aleatório para ReAL e CAP</h1>
    <label for="min">MIN:</label>
    <input type="number" id="min" value="1" min="1">
    <label for="max">MAX:</label>
    <input type="number" id="max" min="1">
    <button onclick="generateRandomNumber()">Generate</button>
    <div class="random-number-display" id="randomNumberDisplay">Random Number Will Appear Here</div>

    <script>
        function generateRandomNumber() {
            const min = parseInt(document.getElementById('min').value);
            const max = parseInt(document.getElementById('max').value);
            const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
            document.getElementById('randomNumberDisplay').textContent = randomNumber;
        }
    </script>
</body>
</html>
