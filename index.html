<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Aptos&display=swap" rel="stylesheet">
    <title>Random Generator</title>
    <style>
        body {
            font-family: 'Aptos', sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        input[type="number"], input[type="text"] {
            padding: 0.5em;
            margin: 0.5em 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input[disabled] {
            background-color: #e9e9e9;
            color: #666;
            cursor: not-allowed;
        }
        /* Additional styling for better visuals */
        h1, h2 {
            color: #0056b3;
        }
        button {
            padding: 0.7em;
            border: none;
            border-radius: 5px;
            background-color: #0056b3;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #004494;
        }
    </style>
</head>
<body>
    <h1>Random Generator</h1>

    <form>
        <label for="minField">MIN:</label>
        <input type="number" id="minField" value="1" disabled>

        <label for="maxField">MAX:</label>
        <input type="number" id="maxField" placeholder="Enter max value here">

        <button type="submit">Generate</button>
    </form>
</body>
</html>
