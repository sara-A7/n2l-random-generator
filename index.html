<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Aptos:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Aptos', sans-serif;
            background-color: #f2f2f2; /* light background */
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #ff4500; /* orange instruction text */
        }
        .random-box {
            background-color: #d3d3d3; /* light grey */
            border: 2px solid #ccc;
            padding: 20px;
            border-radius: 8px;
            font-size: 2rem;
            margin: 20px;
            width: 200px;
            text-align: center;
        }
        input, button {
            padding: 10px;
            font-size: 1rem;
            margin: 5px;
            border-radius: 5px;
            border: 2px solid #ccc;
        }
        button {
            background-color: #4CAF50; /* green button */
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049; /* darker green on hover */
        }
    </style>
    <title>Random Number Generator</title>
</head>
<body>
    <h1>Generate a Random Number</h1>
    <div class="random-box" id="random-number">1</div>
    <input type="number" id="max-number" placeholder="Enter MAX number" min="1">
    <button onclick="generateRandomNumber()">Generate</button>

    <script>
        function generateRandomNumber() {
            const max = parseInt(document.getElementById('max-number').value) || 1;
            const randomNumber = Math.floor(Math.random() * max) + 1;
            document.getElementById('random-number').textContent = randomNumber;
        }
    </script>
</body>
</html>
