<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Aptos&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Aptos', sans-serif;
        }
        .random-number-box {
            background-color: lightgrey;
            border: 1px solid #ccc;
            padding: 10px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
    <title>N2L Gerador Aleatório para ReAL e CAP</title>
</head>
<body>
    <h1>N2L Gerador Aleatório para ReAL e CAP</h1>
    <div class="controls">
        <label for="min">MIN: </label>
        <input type="number" id="min" value="1" readonly>
        <label for="max">MAX: </label>
        <input type="number" id="max" value="100">
        <button id="generateBtn">Gerar Random</button>
    </div>
    <div class="random-number-box" id="randomNumberDisplay">
        Random: <span id="randomNumber">0</span>
    </div>
    <script>
        document.getElementById('generateBtn').addEventListener('click', function() {
            const min = Number(document.getElementById('min').value);
            const max = Number(document.getElementById('max').value);
            const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
            document.getElementById('randomNumber').innerText = randomNumber;
        });
    </script>
</body>
</html>
